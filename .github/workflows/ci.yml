name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  PGRX_VERSION: "0.17.0"

jobs:
  ci:
    name: CI (pg${{ matrix.pg }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg: ["16", "17", "18"]

    steps:
      - uses: actions/checkout@v4

      - name: Add PostgreSQL apt repo
        run: |
          sudo apt-get install -y curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] \
            https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update -y

      - name: Install system dependencies
        run: |
          sudo apt-get install -y \
            libclang-dev \
            clang \
            pkg-config \
            libssl-dev \
            postgresql-${{ matrix.pg }} \
            postgresql-server-dev-${{ matrix.pg }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93"
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-pgrx
            ~/.pgrx
            target
          key: ${{ runner.os }}-pg${{ matrix.pg }}-pgrx${{ env.PGRX_VERSION }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-pg${{ matrix.pg }}-pgrx${{ env.PGRX_VERSION }}-

      - name: Install cargo-pgrx
        run: |
          if ! cargo pgrx --version 2>/dev/null | grep -q "${{ env.PGRX_VERSION }}"; then
            cargo install cargo-pgrx --version ${{ env.PGRX_VERSION }} --locked
          fi

      - name: Init pgrx
        run: cargo pgrx init --pg${{ matrix.pg }} /usr/lib/postgresql/${{ matrix.pg }}/bin/pg_config

      - name: Run CI
        run: make ci PG_VERSION=${{ matrix.pg }}
