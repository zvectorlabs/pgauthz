name: "grammar_test"
model: |
  type user {}
  type group {
    relations
      define member: [user]
  }
  type document {
    relations
      define owner: [user]
      define editor: [user]
      define viewer: [user | group#member]
    permissions
      define view = viewer
      define edit = editor + owner
      define delete = owner
  }
tests:
  - name: "test_relations_only"
    setup:
      tuples:
        - object: "document:doc1"
          relation: "owner"
          subject: "user:alice"
        - object: "document:doc1"
          relation: "viewer"
          subject: "user:bob"
    assertions:
      - type: "Check"
        object: "document:doc1"
        relation: "owner"
        subject: "user:alice"
        allowed: true
      - type: "Check"
        object: "document:doc1"
        relation: "viewer"
        subject: "user:bob"
        allowed: true
