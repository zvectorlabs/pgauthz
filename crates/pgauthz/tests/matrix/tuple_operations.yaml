name: "tuple_operations"
model: |
  type user {}
  type document {
    relations
      define viewer: [user]
      define editor: [user]
      define owner: [user]
  }
tests:
  - name: "tuple_lifecycle"
    setup:
      tuples:
        - object: "document:doc1"
          relation: "viewer"
          subject: "user:alice"
    assertions:
      - type: "Check"
        object: "document:doc1"
        relation: "viewer"
        subject: "user:alice"
        allowed: true

  - name: "tuple_filtering_by_object"
    setup:
      tuples:
        - object: "document:doc1"
          relation: "viewer"
          subject: "user:alice"
        - object: "document:doc1"
          relation: "viewer"
          subject: "user:bob"
        - object: "document:doc2"
          relation: "viewer"
          subject: "user:alice"
        - object: "document:doc3"
          relation: "viewer"
          subject: "user:charlie"
    assertions:
      - type: "Check"
        object: "document:doc1"
        relation: "viewer"
        subject: "user:alice"
        allowed: true
      - type: "Check"
        object: "document:doc1"
        relation: "viewer"
        subject: "user:bob"
        allowed: true
      - type: "Check"
        object: "document:doc2"
        relation: "viewer"
        subject: "user:alice"
        allowed: true
      - type: "Check"
        object: "document:doc3"
        relation: "viewer"
        subject: "user:charlie"
        allowed: true

  - name: "tuple_batch_operations"
    setup:
      tuples:
        - object: "document:doc1"
          relation: "viewer"
          subject: "user:alice"
        - object: "document:doc1"
          relation: "editor"
          subject: "user:bob"
        - object: "document:doc2"
          relation: "viewer"
          subject: "user:alice"
        - object: "document:doc2"
          relation: "owner"
          subject: "user:charlie"
    assertions:
      - type: "Check"
        object: "document:doc1"
        relation: "viewer"
        subject: "user:alice"
        allowed: true
      - type: "Check"
        object: "document:doc1"
        relation: "editor"
        subject: "user:bob"
        allowed: true
      - type: "Check"
        object: "document:doc2"
        relation: "viewer"
        subject: "user:alice"
        allowed: true
      - type: "Check"
        object: "document:doc2"
        relation: "owner"
        subject: "user:charlie"
        allowed: true

  - name: "no_access_without_tuple"
    assertions:
      - type: "Check"
        object: "document:nonexistent"
        relation: "viewer"
        subject: "user:alice"
        allowed: false
      - type: "Check"
        object: "document:doc1"
        relation: "editor"
        subject: "user:alice"
        allowed: false  # alice is only viewer
      - type: "Check"
        object: "document:doc1"
        relation: "owner"
        subject: "user:bob"
        allowed: false  # bob is only editor
